<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리 등록 - Product Management</title>
  <style>
    body {
      font-family: 'Malgun Gothic', Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }

    h1 {
      border-bottom: 2px solid #4a90d9;
      padding-bottom: 10px;
      color: #2c3e50;
    }

    .back-btn {
      display: inline-block;
      padding: 8px 16px;
      background: #6c757d;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      margin-bottom: 24px;
    }

    .back-btn:hover {
      background: #545b62;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
      color: #495057;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 1em;
      box-sizing: border-box;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
    }

    .field-error {
      border-color: #e74c3c !important;
    }

    .error-msg {
      color: #e74c3c;
      font-size: 0.85em;
      margin-top: 5px;
      display: block;
    }

    .btn-submit {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 12px 32px;
      font-size: 1em;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-submit:hover {
      background: #357abd;
    }

    .required {
      color: #e74c3c;
    }
  </style>
</head>
<body>

<h1>카테고리 등록</h1>

<a class="back-btn" th:href="@{/categories}">← 카테고리 목록으로 돌아가기</a>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
  <div class="form-group">
    <label for="name">
      카테고리명 <span class="required">*</span>
    </label>
    <!-- th:field가 name, id, value를 자동 설정 -->
    <input
            id="name"
            type="text"
            th:field="*{name}"
            th:classappend="${#fields.hasErrors('name')} ? ' field-error' : ''"
            placeholder="카테고리 이름을 입력하세요" />
    <!-- th:errors: BindingResult 오류(중복/공백) 메시지 자동 표시 -->
    <span
            class="error-msg"
            th:if="${#fields.hasErrors('name')}"
            th:errors="*{name}">
      카테고리명 오류
    </span>
  </div>

  <div class="form-group">
    <button type="submit" class="btn-submit">등록</button>
  </div>
</form>

<footer>
  <hr>
  <p th:text="'실습 수행 일시: ' + ${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')} + ' | 학번: 2171073 | 성명: 이경석'"></p>
</footer>

</body>
</html>
